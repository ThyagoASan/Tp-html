<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Imagen</title>
    <style>
        body{
            font-family: "Times New Roman", serif;
            margin: 0;
            background-color: #f2f4f8;
            color: #222;
        }

        header{
            background-color: #1f3c88;
            color: white;
            text-align: center;
            padding: 25px;
        }

        header h1{
            margin: 0;
            text-decoration: underline;
        }

        nav{
            background-color: #163172;
            text-align: center;
            padding: 12px;
        }

        nav a{
            color: white;
            text-decoration: none;
            margin: 0 12px;
            font-weight: bold;
            padding: 8px 12px;
            border-radius: 6px;
        }

        nav a:hover{
            background-color: #2852b8;
        }

        main{
            width: 85%;
            margin: 25px auto;
        }

        .caja{
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.15);
        }

        h2{
            color: #1f3c88;
        }

        h3{
            color: #2852b8;
        }

        img{
            display: block;
            margin: 20px auto;
            border-radius: 10px;
            box-shadow: 0 0 8px rgba(0,0,0,0.25);
        }

        footer{
            background-color: #1f3c88;
            color: white;
            text-align: center;

            margin-top: 30px;

<body>

    <header>
        <h1>Imagen</h1>
        <p>Uso de la etiqueta img</p>

    <nav>
        <a href="index.html">Inicio</a>
        <a href="Pagina2.html">Imagen</a>

    <main>
        <section class="caja">
            <h2>Contenido visual</h2>
            <h3>Imagen insertada en HTML</h3>
            <p>
                En esta página se muestra una imagen incorporada desde una carpeta local
                del proyecto mediante la etiqueta <b>img</b>.
            </p>

            <img src="img/Foto.jfif" alt="Imagen del sitio" width="350">
        </section>
    </main>

    <footer>
        <p>Página dedicada a imágenes locales</p>
